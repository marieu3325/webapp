<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarieU 관리자 - 제출 목록</title>
<style>
  * { box-sizing: border-box; margin:0; padding:0; }
  body { font-family: 'Malgun Gothic','맑은 고딕', sans-serif; background:#f4f4f4; color:#222; padding:24px 16px; }
  .wrap { max-width: 1000px; margin: 0 auto; }
  .card { background:#fff; border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,.1); padding:24px; margin-bottom:18px; }
  h1 { color:#B87340; font-size:22px; margin-bottom:6px; }
  .sub { color:#888; font-size:12px; margin-bottom:18px; }
  .login-row { display:flex; gap:10px; }
  input[type=password], input[type=text] {
    flex:1; padding:10px 12px; border:1.5px solid #ddd; border-radius:8px; font-size:13px; outline:none;
  }
  input[type=password]:focus, input[type=text]:focus { border-color:#B87340; }
  button {
    background:#B87340; color:#fff; border:none; border-radius:8px;
    padding:10px 18px; font-size:13px; font-weight:700; cursor:pointer;
  }
  button:hover { opacity:.88; }
  button.secondary { background:#f0e3d6; color:#5a4030; }
  .error { color:#c0392b; font-size:12px; margin-top:8px; }
  table { width:100%; border-collapse: collapse; font-size:12.5px; }
  th, td { padding:8px 10px; border-bottom:1px solid #eee; text-align:left; vertical-align:top; }
  th { background:#f5f0eb; color:#5a4030; position: sticky; top:0; }
  tr:hover { background:#FDF8F3; }
  .detail-btn { background:#fff; color:#B87340; border:1.5px solid #B87340; padding:4px 10px; font-size:11px; border-radius:6px; cursor:pointer; }
  .toolbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; flex-wrap:wrap; gap:8px; }
  .count { color:#888; font-size:12.5px; }
  .modal-bg {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.45);
    align-items:center; justify-content:center; z-index:200; padding:20px;
  }
  .modal-bg.show { display:flex; }
  .modal { background:#fff; border-radius:14px; max-width:640px; width:100%; max-height:80vh; overflow-y:auto; padding:24px; }
  .modal h3 { color:#B87340; margin-bottom:12px; }
  .modal .row { display:flex; font-size:12.5px; padding:5px 0; border-bottom:1px dashed #eee; }
  .modal .k { width:140px; color:#888; flex-shrink:0; }
  .modal .v { color:#222; word-break: break-all; }
  .modal-close { margin-top:14px; }
  #hidden-area { display:none; }
</style>
</head>
<body>
<div class="wrap">

  <div class="card" id="loginCard">
    <h1>MarieU 관리자</h1>
    <div class="sub">제출된 신청서를 조회합니다. 관리자 비밀번호를 입력하세요.</div>
    <div class="login-row">
      <input type="password" id="pwInput" placeholder="관리자 비밀번호">
      <button id="btnLogin">조회</button>
    </div>
    <div class="error" id="loginError"></div>
  </div>

  <div class="card" id="listCard" style="display:none">
    <div class="toolbar">
      <div>
        <h1 style="font-size:18px">제출된 신청서 목록</h1>
        <div class="count" id="countText"></div>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="secondary" id="btnRefresh">새로고침</button>
        <button class="secondary" id="btnLogout">로그아웃</button>
      </div>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr><th>제출일시</th><th>성명</th><th>휴대폰</th><th>이메일</th><th></th></tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>신청서 상세</h3>
    <div id="modalBody"></div>
    <button class="secondary modal-close" id="btnCloseModal">닫기</button>
  </div>
</div>

<script>
(function(){
  let adminPassword = '';
  let applications = [];

  const loginCard = document.getElementById('loginCard');
  const listCard = document.getElementById('listCard');
  const pwInput = document.getElementById('pwInput');
  const loginError = document.getElementById('loginError');

  async function fetchList(){
    loginError.textContent = '';
    const res = await fetch('/.netlify/functions/list-applications', {
      headers: { 'x-admin-password': adminPassword }
    });
    const result = await res.json();
    if (!res.ok || !result.ok){
      throw new Error(result.error || '조회 실패');
    }
    return result.applications;
  }

  function renderList(){
    document.getElementById('countText').textContent = `총 ${applications.length}건`;
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = applications.map((a, idx) => `
      <tr>
        <td>${new Date(a.created_at).toLocaleString('ko-KR')}</td>
        <td>${escapeHtml(a.name||'')}</td>
        <td>${escapeHtml(a.phone||'')}</td>
        <td>${escapeHtml(a.email||'')}</td>
        <td><button class="detail-btn" data-idx="${idx}">상세보기</button></td>
      </tr>
    `).join('');
    tbody.querySelectorAll('.detail-btn').forEach(btn=>{
      btn.addEventListener('click', ()=> showDetail(Number(btn.dataset.idx)));
    });
  }

  function escapeHtml(str){
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showDetail(idx){
    const app = applications[idx];
    const modalBody = document.getElementById('modalBody');
    if (app.decryptError){
      modalBody.innerHTML = `<div class="error">${escapeHtml(app.decryptError)}</div>`;
    } else {
      const d = app.detail || {};
      const rows = Object.keys(d).map(k => {
        let v = d[k];
        if (Array.isArray(v)) v = v.join(', ');
        if (typeof v === 'boolean') v = v ? '예' : '아니오';
        return `<div class="row"><div class="k">${escapeHtml(k)}</div><div class="v">${v ? escapeHtml(String(v)) : '-'}</div></div>`;
      }).join('');
      modalBody.innerHTML = rows;
    }
    document.getElementById('modalBg').classList.add('show');
  }

  document.getElementById('btnCloseModal').addEventListener('click', ()=>{
    document.getElementById('modalBg').classList.remove('show');
  });

  document.getElementById('btnLogin').addEventListener('click', async ()=>{
    adminPassword = pwInput.value;
    if (!adminPassword){ loginError.textContent = '비밀번호를 입력하세요.'; return; }
    try {
      applications = await fetchList();
      loginCard.style.display = 'none';
      listCard.style.display = 'block';
      renderList();
    } catch(e){
      loginError.textContent = e.message;
    }
  });

  pwInput.addEventListener('keydown', (e)=>{
    if (e.key === 'Enter') document.getElementById('btnLogin').click();
  });

  document.getElementById('btnRefresh').addEventListener('click', async ()=>{
    try {
      applications = await fetchList();
      renderList();
    } catch(e){
      alert(e.message);
    }
  });

  document.getElementById('btnLogout').addEventListener('click', ()=>{
    adminPassword = '';
    applications = [];
    pwInput.value = '';
    listCard.style.display = 'none';
    loginCard.style.display = 'block';
  });
})();
</script>
</body>
</html>
